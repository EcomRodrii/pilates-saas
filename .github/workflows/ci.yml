name: CI

on:
  push:
  pull_request:

# Cancela ejecuciones anteriores de la misma rama/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Valores dummy: el build y el dev server crean el cliente de Supabase con
    # estas envs, pero los tests mockean toda la red — no se conecta a nada real.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key-for-ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests unitarios (dinero · reservas · aforo · fiscal)
        run: npm test

      - name: Build de producción
        run: npm run build

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E (registro · reserva · pago)
        run: npx playwright test

      - name: Subir reporte de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
